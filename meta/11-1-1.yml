indicator_note: >
  Proportion of population in  households without centralized water supply 

  Կենտրոնացված ջրամատակարարում չունեցող տնտեսություններում ապրող բնակչության
  հարաբերական կշիռը

  Доля населения, проживающего в домохозяйствах без централизованного
  водоснабжения


  Proportion of population using safely managed sanitation facility

  Կենտրոնացված ջրահեռացման համակարգ չունեցող տնտեսություններում ապրող
  բնակչության հարաբերական կշիռը

  Доля населения, проживающего в домохозяйствах без централизованной санитарии


  The proportion of present population living in households with more than 3
  people per room

  Մեկ սենյակում 3-ից ավելի անձ բնակեցված տնտեսություններում բնակվող առկա
  բնակչության հարաբերական կշիռը

  Доля наличного населения, проживающего в домохозяйствах с более чем тремя
  лицами на одну комнату


  The proportion of population living in households complained about humidity,
  leaking roof, dilapidated walls and floor  or dilapidated window frames and
  doors

  Բնակարանային վատ վիճակի (խոնավություն, տանիքի արտահոսք, քայքայված պատեր,
  հատակներ, պատուհաններ և դռներ) վերաբերյալ բողոք ներկայացրած տնտեսություններում
  բնակվող բնակչության տեսակարար կշիռը

  Доля населения, проживающего в домохозяйствах, заявивших о
  неудовлетворительном состоянии жилья
