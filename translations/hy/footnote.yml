1-2-1: "Տվյալների արդիականացումն ապահովելու նպատակով, 2024թ. հետազոտության ընտրանքային կշիռները ճշգրտվել են (կալիբրացվել են)՝ հիմք ընդունելով ՀՀ 2022թ. մարդահամարի հիմքով վարվող մշտական բնակչության  ընթացիկ հաշվառման տվյալները: Նշվածով պայմանավորված 2024թ. աղքատության վերաբերյալ ներկայացվող ցուցանիշները համադրելի չեն 2022 և 2023թթ. համապատասխան ցուցանիշների հետ:"
