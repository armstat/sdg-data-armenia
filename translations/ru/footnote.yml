1-2-1: "Для обеспечения актуальности данных выборочные веса обследования 2024 года были пересмотрены (калиброваны) на основе текущих данных учета постоянного населения, сформированных по итогам переписи населения Республики Армения 2022 года. В связи с этим показатели бедности за 2024 год не являются сопоставимыми с показателями за 2022 и 2023 годы."
